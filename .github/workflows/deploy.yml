name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set Up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build the Application
        run: mvn clean package

      - name: Run Unit Tests
        run: mvn test

      - name: Trigger Jenkins Deployment
        run: |
          curl -X POST "http://your-jenkins-url/job/jenkins_tomcat_demo/buildWithParameters?token=${{ secrets.JENKINS_API_TOKEN }}"
        env:
          JENKINS_USER: ${{ secrets.JENKINS_USER }}
          JENKINS_API_TOKEN: ${{ secrets.JENKINS_API_TOKEN }}
